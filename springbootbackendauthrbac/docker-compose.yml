services:
  postgres:
    image: postgres:17
    container_name: postgres-auth-rbac

    environment:
      POSTGRES_DB: auth_rbac_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: